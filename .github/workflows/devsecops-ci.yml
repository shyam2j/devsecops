name: DevSecOps CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  scan:
    name: Security & quality scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install scan tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install checkov

      - name: Run Checkov for IaC policy checks
        run: |
          if find . -maxdepth 2 \( -name '*.tf' -o -name '*.yml' -o -name '*.yaml' -o -name 'Dockerfile' \) | grep -q .; then
            checkov -d .
          else
            echo 'No infrastructure files found; add Terraform/CloudFormation/Dockerfile to scan.'
          fi

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.7.0
        with:
          scan-type: filesystem
          scan-dir: '.'
          vulnerability-types: 'os,library'
          severity: 'HIGH,CRITICAL'
