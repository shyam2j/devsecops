name: Software Composition Analysis (SCA)

on:
  workflow_call: {}

jobs:
  sca:
    name: Run SCA tools
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '18'
      - name: Install dependency scanner
        run: |
          npm install -g @snyk/cli
      - name: Run dependency scan
        run: |
          snyk test || true
      - name: Upload results
        run: |
          echo "SCA scan completed"
